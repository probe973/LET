<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LET Workshops</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* Light blue-gray background */
            padding-top: 4rem; /* Add padding to body to prevent content from being hidden behind fixed nav bar */
        }
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 1.5rem;
            background-color: #ffffff;
            border-radius: 0.75rem; /* Rounded corners */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            /* Removed text-align: center from here */
        }
        h1 {
            font-weight: 700;
            color: #000000; /* Black ink for headings */
            font-size: 2.25rem; /* text-4xl */
            margin-bottom: 1rem;
            text-align: left; /* Left-justify the heading */
        }
        .course-link-text {
            font-size: 1.125rem; /* text-lg */
            font-weight: 600; /* Semi-bold */
            color: #3b82f6; /* Blue for the link */
            text-decoration: none;
            transition: color 0.2s ease;
            display: block; /* Make it a block element to control its alignment */
            text-align: left; /* Left-justify the link */
            margin-top: 0.5rem; /* Space below heading */
            margin-bottom: 1rem; /* Space below link */
        }
        .course-link-text:hover {
            color: #2563eb; /* Darker blue on hover */
        }

        .fixed-nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #000000; /* Black background */
            min-height: 4rem; /* Same height as others */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1.5rem; /* Horizontal padding */
            z-index: 50;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-bottom-left-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
            color: white;
            font-size: 1.125rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="p-4 sm:p-6 md:p-8">
    <!-- Fixed Navigation Bar -->
    <nav class="fixed-nav-bar">
        <span>LET Workshops</span>
    </nav>

    <div class="container">
        <header class="mb-8">
            <h1 class="text-4xl">Economics</h1>
        </header>

        <section>
            <a href="eco/5007a/index.html" class="course-link-text">ECO-5007A</a>
        </section>
    </div>
</body>
</html>
